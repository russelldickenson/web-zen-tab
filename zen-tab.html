<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenTab</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235E5E5E' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='3' width='7' height='7'/%3E%3Crect x='14' y='3' width='7' height='7'/%3E%3Crect x='3' y='14' width='7' height='7'/%3E%3Crect x='14' y='14' width='7' height='7'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0B0B0C;
      --top-bar-bg: rgba(11, 11, 12, 0.7);
      --surface: rgba(24, 24, 28, 0.65);
      --text: #FFFFFF;
      --text-dim: rgba(255, 255, 255, 0.75);
      --text-muted: rgba(255, 255, 255, 0.45);
      --text-faint: rgba(255, 255, 255, 0.25);
      --border: rgba(255, 255, 255, 0.12);
      --border-subtle: rgba(255, 255, 255, 0.08);
      --btn-bg: rgba(255, 255, 255, 0.06);
      --btn-border: rgba(255, 255, 255, 0.08);
      --btn-hover: rgba(255, 255, 255, 0.12);
      --accent: #00B4D8;
      --accent-hover: #0096C7;
      --alert: #FF453A;
      --success: #30D158;
      --shadow: rgba(0, 0, 0, 0.2);
      --shadow-lg: rgba(0, 0, 0, 0.45);
      --checkbox-border: rgba(255, 255, 255, 0.3);
      --todo-border: rgba(255, 255, 255, 0.08);
      --todo-done: rgba(255, 255, 255, 0.5);
      --resize-line: rgba(255, 255, 255, 0.25);
    }
    [data-theme="light"] {
      --bg: #F4F4F7;
      --top-bar-bg: rgba(244, 244, 247, 0.7);
      --surface: rgba(255, 255, 255, 0.65);
      --text: #1C1C1E;
      --text-dim: rgba(0, 0, 0, 0.7);
      --text-muted: rgba(0, 0, 0, 0.45);
      --text-faint: rgba(0, 0, 0, 0.25);
      --border: rgba(0, 0, 0, 0.1);
      --border-subtle: rgba(0, 0, 0, 0.05);
      --btn-bg: rgba(0, 0, 0, 0.05);
      --btn-border: rgba(0, 0, 0, 0.08);
      --btn-hover: rgba(0, 0, 0, 0.08);
      --accent: #0077B6;
      --accent-hover: #005F9E;
      --alert: #FF3B30;
      --success: #34C759;
      --shadow: rgba(0, 0, 0, 0.05);
      --shadow-lg: rgba(0, 0, 0, 0.12);
      --checkbox-border: rgba(0, 0, 0, 0.25);
      --todo-border: rgba(0, 0, 0, 0.06);
      --todo-done: rgba(0, 0, 0, 0.45);
      --resize-line: rgba(0, 0, 0, 0.2);
    }
    .widget-sticky { background: rgba(254, 249, 195, 0.12); border-color: rgba(254, 249, 195, 0.22); }
    [data-theme="light"] .widget-sticky { background: rgba(254, 249, 195, 0.75); border-color: rgba(232, 223, 122, 0.6); }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.12); }
    [data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.22); }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* Buttons */
    .btn {
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--text-dim);
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .btn:hover { background: var(--btn-hover); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .btn-sm { padding: 3px 10px; font-size: 11px; border-radius: 6px; }

    /* Top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 32px;
      background: var(--top-bar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 1000;
      box-shadow: 0 4px 20px var(--shadow);
      transition: background 0.3s, border-color 0.3s;
    }
    .top-left, .top-center, .top-right {
      display: flex;
      align-items: center;
    }
    .top-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      user-select: none;
    }
    .header-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .widget-creator-buttons {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .add-widget-action {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s;
    }
    .add-widget-action:hover {
      background-color: var(--btn-hover);
      color: var(--text);
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 4px 12px var(--shadow);
    }
    .add-widget-action:active {
      transform: translateY(0) scale(0.95);
    }
    .top-right { display: flex; align-items: center; gap: 12px; }
    .top-right button {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      box-shadow: 0 2px 8px var(--shadow);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.2s ease,
                  border-color 0.2s ease;
    }
    .top-right button:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 20px var(--shadow-lg);
    }
    #snap-toggle { opacity: 0.7; }
    #snap-toggle.active { opacity: 1; color: var(--accent); }
    .icon-sun, .icon-moon { display: none; }
    [data-theme="dark"] .icon-sun { display: block; }
    [data-theme="light"] .icon-moon { display: block; }

    /* Canvas area */
    #widget-area {
      position: absolute;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
    }
    body.grid-bg {
      background-color: var(--bg);
      background-image:
        linear-gradient(to right, rgba(156,163,175,0.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(156,163,175,0.08) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    body.grid-bg[data-theme="dark"] {
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
    }
    body.grid-bg[data-theme="light"] {
      background-image:
        linear-gradient(to right, rgba(0,0,0,0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.06) 1px, transparent 1px);
    }

    /* Widgets */
    .widget {
      position: absolute;
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 32px 0 var(--shadow);
      min-width: 220px;
      min-height: 120px;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: fadeInScale 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.92) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .widget:not(.widget-clock):hover {
      box-shadow: 0 12px 40px var(--shadow-lg);
      transform: translateY(-2px);
    }
    .widget-header {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      background: var(--btn-bg);
      border-bottom: 1px solid var(--border-subtle);
      gap: 8px;
      flex-shrink: 0;
      cursor: grab;
      transition: outline 0.15s;
    }
    .widget-header:active { cursor: grabbing; }
    .widget-header:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }
    .drag-handle {
      color: var(--text-dim);
      font-size: 16px;
      line-height: 1;
      user-select: none;
    }
    .widget-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      flex: 1;
    }
    .widget-menu-wrap {
      position: relative;
      display: inline-flex;
    }
    .widget-menu-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, opacity 0.15s;
      opacity: 0.6;
    }
    .widget-menu-btn:hover {
      opacity: 1;
      color: var(--accent);
    }
    .widget-menu-dropdown {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 12px var(--shadow-lg);
      min-width: 120px;
      padding: 4px;
      margin: 0;
      position-area: block-end span-inline-end;
      inset: auto;
      position-try-fallbacks: flip-block, flip-inline;
    }
    .widget-menu-dropdown:popover-open {
      display: block;
      animation: dropdownIn 0.12s ease-out;
    }
    .widget-menu-item {
      background: none;
      border: none;
      width: 100%;
      font-family: inherit;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      border-radius: 4px;
      transition: background-color 0.15s, color 0.15s;
      white-space: nowrap;
      text-align: left;
    }
    .widget-menu-item:hover {
      background-color: var(--btn-hover);
    }
    .widget-menu-item.delete-widget {
      color: var(--alert);
    }
    .widget-menu-item.delete-widget:hover {
      background-color: rgba(255, 69, 58, 0.12);
    }
    .widget-body {
      flex: 1;
      padding: 16px;
      overflow: auto;
      position: relative;
    }

    /* Resize handle */
    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 18px;
      height: 18px;
      cursor: nwse-resize;
    }
    .resize-handle::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 0 18px 18px;
      border-color: transparent transparent rgba(180,180,180,0.3) transparent;
      transition: border-color 0.15s;
    }
    .resize-handle:hover::after { border-color: transparent transparent rgba(180,180,180,0.6) transparent; }

    /* Sticky note */
    .sticky-note textarea {
      width: 100%;
      min-height: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.6;
      overflow: hidden;
    }
    .sticky-note textarea::placeholder { color: var(--text-muted); }
    .widget-sticky .widget-body { overflow: hidden; }
    .widget-sticky:focus-within,
    .widget-todo:focus-within { box-shadow: 0 8px 25px rgba(0,0,0,0.55); }
    .dark .widget-sticky:focus-within,
    .dark .widget-todo:focus-within { box-shadow: 0 8px 25px rgba(0,0,0,0.35); }

    /* Clock widget */
    .widget-clock { min-width: 300px; min-height: 90px; background: transparent; border-color: transparent; box-shadow: none; }
    .widget-clock .widget-body { padding: 6px 12px; }
    .widget-clock .widget-header { background: transparent; border-bottom-color: transparent; }
    .widget-clock .widget-header,
    .widget-clock .widget-menu-btn,
    .widget-clock .resize-handle::after { opacity: 0; transition: opacity 0.2s; }
    .widget-clock:hover .widget-header,
    .widget-clock:hover .widget-menu-btn,
    .widget-clock:hover .resize-handle::after,
    .widget-clock:focus-within .widget-header,
    .widget-clock:focus-within .widget-menu-btn { opacity: 1; }
    .clock-body {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 16px;
      height: 100%;
      padding: 6px 0;
      overflow: hidden;
      container-type: size;
    }
    .clock-display {
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      line-height: 1;
      white-space: nowrap;
      font-size: clamp(16px, min(calc((100cqi - 70px) * var(--clock-ratio, 0.22)), 80cqb), 120px);
    }
    .widget-clock[data-format="12h"] {
      --clock-ratio: 0.22;
    }
    .widget-clock[data-format="24h"] {
      --clock-ratio: 0.32;
    }

    /* Pomodoro widget */
    .widget-pomodoro { min-width: 260px; min-height: 200px; }
    .widget-pomodoro .widget-body { overflow: hidden; padding: 10px 14px 12px; }
    .pomodoro-body {
      height: 100%; display: flex; flex-direction: column; align-items: center;
      justify-content: space-between; gap: 8px;
    }
    .pomodoro-modes {
      display: flex; width: 100%; padding: 3px; gap: 2px;
      background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 9px;
    }
    .pomodoro-mode {
      flex: 1; border: 0; border-radius: 6px; padding: 7px 4px; background: transparent;
      color: var(--text-muted); cursor: pointer; font: inherit; font-size: 11px; font-weight: 600;
      transition: color 0.2s, background 0.2s;
    }
    .pomodoro-mode:hover { color: var(--text); }
    .pomodoro-mode.active { background: rgba(0, 180, 216, 0.18); color: var(--accent); }
    .pomodoro-mode:focus-visible, .pomodoro-start:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .pomodoro-display {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 6px 0; width: 100%;
    }
    .pomodoro-time { font: 600 clamp(36px, 10vw, 48px)/1 'JetBrains Mono', monospace; letter-spacing: -2px; font-variant-numeric: tabular-nums; color: var(--text); }
    .pomodoro-status { margin-top: 4px; color: var(--accent); font-size: 11px; font-weight: 500; min-height: 14px; }
    .pomodoro-start { width: 100%; padding: 10px 16px; border-radius: 9px; font: inherit; font-size: 14px; font-weight: 600; }
    .clock-toggle-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .clock-switch-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      user-select: none;
    }
    .clock-switch {
      position: relative;
      width: 34px;
      height: 18px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 9px;
      cursor: pointer;
      padding: 0;
      transition: background 0.25s, border-color 0.25s, transform 0.2s;
    }
    .clock-switch:active {
      transform: scale(0.95);
    }
    .clock-switch:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .clock-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s;
    }
    .clock-switch:hover::after {
      background: var(--text-dim);
    }
    .clock-switch.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .clock-switch.active::after {
      transform: translateX(16px);
      background: #fff;
    }

    /* Calendar widget */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .cal-month-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      text-align: center;
    }
    .cal-day-header {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 2px 0 4px;
    }
    .cal-day {
      font-size: 13px;
      padding: 4px 0;
      border-radius: 50%;
      color: var(--text);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-day.other-month { color: var(--text-muted); }
    .cal-day.today {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      border-radius: 6px;
    }
    .widget-calendar .widget-body { overflow: hidden; }

    /* Todo */
    .todo-list { list-style: none; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
    }
    .todo-item input[type="checkbox"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--checkbox-border);
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: background 0.2s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.2s, transform 0.1s;
    }
    .todo-item input[type="checkbox"]:active {
      transform: scale(0.9);
    }
    .todo-item input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .todo-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .todo-item .todo-text {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--todo-border);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      padding: 4px 0;
    }
    .todo-item .todo-text::placeholder { color: var(--text-muted); }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--todo-done);
    }
    .todo-item .todo-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-faint);
      font-size: 14px;
      transition: color 0.15s, transform 0.15s;
      flex-shrink: 0;
      padding: 0 4px;
      font-family: inherit;
    }
    .todo-item .todo-delete:hover {
      color: var(--alert);
      transform: scale(1.2);
    }
    .add-todo {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      padding: 6px 0;
      transition: color 0.15s;
    }
    .add-todo:hover { color: var(--text-dim); }

    /* Native Dialog */
    dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      min-width: 300px;
      box-shadow: 0 8px 30px var(--shadow-lg);
      color: var(--text);
      margin: auto;
    }
    dialog::backdrop {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
    }
    dialog p {
      font-size: 15px;
      margin-bottom: 20px;
      color: var(--text);
    }
    .modal-buttons { display: flex; gap: 10px; justify-content: center; }
    .modal-btn { padding: 8px 20px; font-size: 14px; }
    .modal-btn-cancel { background: var(--btn-bg); color: var(--text-dim); }
    .modal-btn-cancel:hover { background: var(--btn-hover); }
    .modal-btn-confirm { background: var(--alert); border-color: var(--alert); color: #fff; }
    .modal-btn-confirm:hover { background: #e0302a; }

    /* Shortcuts widget */
    .widget-shortcuts {
      min-width: 274px;
      min-height: 149px;
    }
    .widget-shortcuts .widget-body {
      overflow: hidden;
    }
    .shortcuts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 82px);
      gap: 12px;
      justify-content: center;
      align-content: center;
    }
    .shortcut-cell {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 82px;
      height: 82px;
      border-radius: 12px;
      border: 1px solid transparent;
      transition: background-color 0.2s, border-color 0.2s;
    }
    .shortcut-cell.filled:hover,
    .shortcut-cell.filled:focus-within {
      border-color: var(--border-subtle);
    }
    .shortcut-cell.filled:hover {
      background-color: var(--btn-bg);
    }
    .shortcut-cell a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      text-decoration: none;
      gap: 6px;
    }
    .shortcut-icon {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px;
      object-fit: contain;
      box-shadow: 0 2px 6px var(--shadow);
    }
    .shortcut-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
      padding: 0 4px;
    }
    .shortcut-cell.empty {
      border: 1.5px dashed transparent;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: background-color 0.2s, border-color 0.2s;
    }
    .shortcut-cell.empty:hover,
    .shortcut-cell.empty:focus-visible {
      border-color: var(--border);
    }
    .shortcut-cell.empty .shortcut-add-icon {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
      opacity: 0.6;
      transition: opacity 0.2s, transform 0.2s;
    }
    .shortcut-cell.empty .shortcut-label {
      position: absolute;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      transform: translateY(5px);
      font-size: 11px;
      text-align: center;
      color: var(--text-muted);
    }
    .shortcut-cell.empty:hover .shortcut-add-icon,
    .shortcut-cell.empty:focus-visible .shortcut-add-icon {
      opacity: 0;
      transform: scale(0.8);
    }
    .shortcut-cell.empty:hover .shortcut-label,
    .shortcut-cell.empty:focus-visible .shortcut-label {
      opacity: 1;
      transform: translateY(0);
    }
    .shortcut-cell.empty:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .shortcut-add-icon {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .shortcut-cell.add-shortcut-btn:hover .shortcut-add-icon {
      color: var(--text);
    }
    .shortcut-delete {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--alert);
      color: #fff;
      border: none;
      font-size: 11px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .shortcut-cell:hover .shortcut-delete {
      opacity: 1;
      pointer-events: auto;
    }
    .shortcut-delete:hover {
      transform: scale(1.1);
    }

  </style>
</head>
<body>

  <div class="top-bar">
    <div class="top-left">
      <div class="header-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        <h1 class="header-title">ZenTab</h1>
      </div>
    </div>
    
    <div class="top-center">
      <div class="widget-creator-buttons">
        <button class="add-widget-action" data-type="sticky" title="Add Sticky Note">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
        </button>
        <button class="add-widget-action" data-type="todo" title="Add Todo List">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="11" x2="17" y2="11"/><line x1="9" y1="15" x2="17" y2="15"/><line x1="9" y1="7" x2="17" y2="7"/><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
        </button>
        <button class="add-widget-action" data-type="clock" title="Add Clock">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <button class="add-widget-action" data-type="calendar" title="Add Calendar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </button>
        <button class="add-widget-action" data-type="shortcuts" title="Add Shortcuts">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <button class="add-widget-action" data-type="pomodoro" title="Add Pomodoro Timer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M9 2h6"/><path d="M12 5V2"/><path d="M12 9v4l3 2"/></svg>
        </button>
      </div>
    </div>

    <div class="top-right">
      <button id="snap-toggle" class="btn active" aria-label="Toggle snap to grid" title="Toggle Grid Snapping">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button id="theme-toggle" class="btn" aria-label="Toggle theme" title="Toggle Theme">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="widget-area"></div>

  <dialog id="close-modal" closedby="any" aria-label="Confirm widget removal">
    <p>Remove this widget?</p>
    <div class="modal-buttons">
      <button class="btn modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn modal-btn modal-btn-confirm" id="modal-confirm">Remove</button>
    </div>
  </dialog>

  <dialog id="shortcut-modal" closedby="any" aria-labelledby="shortcut-modal-title" style="max-width: 320px;">
    <h2 id="shortcut-modal-title" style="font-weight: 600; margin-bottom: 16px; font-size: 16px; margin-top: 0; color: var(--text);">Add shortcut</h2>
    <form id="shortcut-form">
      <div style="margin-bottom: 12px;">
        <label for="shortcut-url" style="display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500;">URL</label>
        <input type="text" id="shortcut-url" placeholder="https://example.com" required style="width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--btn-bg); color: var(--text); outline: none; font-size: 13px;">
      </div>
      <div style="margin-bottom: 20px;">
        <label for="shortcut-title" style="display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500;">Name</label>
        <input type="text" id="shortcut-title" placeholder="Optional (defaults to website name)" style="width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--btn-bg); color: var(--text); outline: none; font-size: 13px;">
      </div>
      <div class="modal-buttons" style="justify-content: flex-end;">
        <button type="button" class="btn modal-btn modal-btn-cancel" id="shortcut-cancel" style="padding: 6px 14px; font-size: 13px;">Cancel</button>
        <button type="submit" class="btn modal-btn modal-btn-confirm" style="padding: 6px 14px; font-size: 13px; background: var(--accent); border-color: var(--accent); color: #fff;">Add</button>
      </div>
    </form>
  </dialog>

  <script>
    // Anchor positioning polyfill conditional loading
    if (!("anchorName" in document.documentElement.style)) {
      const script = document.createElement('script');
      script.type = 'module';
      script.src = 'https://unpkg.com/@oddbird/css-anchor-positioning';
      document.head.appendChild(script);
    }

    const SNAP = 20;
    let snapToGrid = localStorage.getItem('snapToGrid') !== 'false';

    // Snap toggle
    const snapToggle = document.getElementById('snap-toggle');
    if (!snapToGrid) snapToggle.classList.remove('active');
    if (snapToGrid) document.body.classList.add('grid-bg');
    snapToggle.addEventListener('click', () => {
      snapToGrid = !snapToGrid;
      snapToggle.classList.toggle('active', snapToGrid);
      document.body.classList.toggle('grid-bg', snapToGrid);
      localStorage.setItem('snapToGrid', snapToGrid);
    });

    // Theme toggle
    const themeToggle = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);

    themeToggle.addEventListener('click', () => {
      const current = document.body.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // Widget persistence
    const WIDGETS_KEY = 'startpage_widgets';
    let nextWidgetId = 1;

    function saveWidgets() {
      const widgets = document.querySelectorAll('.widget');
      const data = [];
      widgets.forEach(w => {
        const type = w.dataset.type;
        const entry = {
          id: w.dataset.id,
          type,
          x: parseInt(w.style.left) || w.offsetLeft,
          y: parseInt(w.style.top) || w.offsetTop,
          width: w.offsetWidth,
          height: w.offsetHeight,
          zIndex: parseInt(w.style.zIndex) || 10,
        };
        if (type === 'sticky') {
          entry.text = w.querySelector('textarea').value;
          entry.resized = w.dataset.resized === 'true';
        } else if (type === 'clock') {
          entry.format = w.dataset.format || '12h';
        } else if (type === 'calendar') {
          entry.viewMonth = parseInt(w.dataset.viewMonth);
          entry.viewYear = parseInt(w.dataset.viewYear);
        } else if (type === 'shortcuts') {
          entry.cells = JSON.parse(w.dataset.cells || '[]');
        } else if (type === 'pomodoro') {
          entry.pomodoro = JSON.parse(w.dataset.pomodoro || '{}');
        } else if (type === 'todo') {
          entry.items = [];
          w.querySelectorAll('.todo-item').forEach(li => {
            entry.items.push({
              text: li.querySelector('.todo-text').value,
              done: li.querySelector('input[type="checkbox"]').checked,
            });
          });
        }
        data.push(entry);
      });
      localStorage.setItem(WIDGETS_KEY, JSON.stringify(data));
    }

    function loadWidgets() {
      const raw = localStorage.getItem(WIDGETS_KEY);
      if (!raw) return;
      let data;
      try { data = JSON.parse(raw); } catch { return; }
      data.forEach(entry => {
        createWidget(entry.type, entry.x, entry.y, entry);
      });
    }

    // Widget creation
    const area = document.getElementById('widget-area');
    let widgetZIndex = 10;

    document.querySelectorAll('.add-widget-action').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.type;
        createWidget(type, 100 + Math.random() * 200, 20 + Math.random() * 150);
      });
    });

    function snap(v) { return snapToGrid ? Math.round(v / SNAP) * SNAP : v; }

    function createWidget(type, x, y, saved) {
      const w = document.createElement('div');
      w.className = 'widget' + (type === 'clock' ? ' widget-clock' : type === 'sticky' ? ' widget-sticky' : type === 'calendar' ? ' widget-calendar' : type === 'todo' ? ' widget-todo' : type === 'shortcuts' ? ' widget-shortcuts' : type === 'pomodoro' ? ' widget-pomodoro' : '');
      w.dataset.type = type;
      w.dataset.id = saved ? saved.id : nextWidgetId++;
      nextWidgetId = Math.max(nextWidgetId, parseInt(w.dataset.id) + 1);
      w.style.left = snap(saved ? saved.x : x) + 'px';
      w.style.top = snap(saved ? saved.y : y) + 'px';
      w.style.width = (saved ? saved.width : (type === 'todo' ? 300 : type === 'clock' ? 320 : type === 'calendar' ? 300 : type === 'shortcuts' ? 274 : type === 'pomodoro' ? 290 : 280)) + 'px';
      w.style.height = (saved ? saved.height : (type === 'todo' ? 250 : type === 'clock' ? 100 : type === 'calendar' ? 300 : type === 'shortcuts' ? 149 : type === 'pomodoro' ? 240 : 200)) + 'px';
      w.style.zIndex = saved ? saved.zIndex : ++widgetZIndex;

      const title = type === 'sticky' ? 'Sticky Note' : type === 'clock' ? 'Clock' : type === 'calendar' ? 'Calendar' : type === 'todo' ? 'Todo List' : type === 'pomodoro' ? 'Pomodoro' : 'Shortcuts';
      const wId = w.dataset.id;

      w.innerHTML = `
        <div class="widget-header" tabindex="0" role="group" aria-label="${title} widget header. Focus here and press Arrow keys to move, Shift + Arrow keys to resize.">
          <span class="widget-title">${title}</span>
          <div class="widget-menu-wrap">
            <button class="widget-menu-btn" popovertarget="menu-dropdown-${wId}" aria-label="Widget options" style="anchor-name: --menu-btn-${wId}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/><circle cx="5" cy="12" r="1.5"/>
              </svg>
            </button>
            <div id="menu-dropdown-${wId}" popover="auto" class="widget-menu-dropdown" style="position-anchor: --menu-btn-${wId}">
              <button class="widget-menu-item delete-widget" type="button">Remove widget</button>
            </div>
          </div>
        </div>
        <div class="widget-body">${type === 'sticky' ? stickyHTML(saved) : type === 'clock' ? clockHTML(saved) : type === 'calendar' ? calendarHTML() : type === 'shortcuts' ? shortcutsHTML(saved) : type === 'pomodoro' ? pomodoroHTML() : todoHTML(saved)}</div>
        <div class="resize-handle"></div>
      `;

      area.appendChild(w);

      // Bring to front
      w.addEventListener('mousedown', () => {
        w.style.zIndex = ++widgetZIndex;
      });

      // Remove widget
      w.querySelector('.delete-widget').addEventListener('click', (e) => {
        e.stopPropagation();
        const menuDropdown = w.querySelector('.widget-menu-dropdown');
        if (menuDropdown.hidePopover) menuDropdown.hidePopover();
        const triggerBtn = w.querySelector('.widget-menu-btn');
        if (triggerBtn) triggerBtn.blur();
        showModal('Remove this widget?', () => {
          if (w._cleanup) w._cleanup();
          w.remove();
          saveWidgets();
        });
      });

      // Drag with snap
      setupDrag(w);
      // Resize
      setupResize(w);

      // Keyboard navigation and resize for widget header
      const header = w.querySelector('.widget-header');
      header.addEventListener('keydown', (e) => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
          e.preventDefault();
          const amount = 20; // SNAP step
          
          if (e.shiftKey) {
            // Keyboard Resize
            let wVal = w.offsetWidth;
            let hVal = w.offsetHeight;
            const minW = parseInt(getComputedStyle(w).minWidth) || 220;
            const minH = parseInt(getComputedStyle(w).minHeight) || 120;
            
            if (e.key === 'ArrowRight') wVal += amount;
            if (e.key === 'ArrowLeft') wVal = Math.max(minW, wVal - amount);
            if (e.key === 'ArrowDown') hVal += amount;
            if (e.key === 'ArrowUp') hVal = Math.max(minH, hVal - amount);
            
            w.style.width = wVal + 'px';
            w.style.height = hVal + 'px';
            
            if (w.dataset.type === 'sticky') {
              w.dataset.resized = 'true';
              const ta = w.querySelector('.sticky-note textarea');
              if (ta) {
                ta.style.height = '100%';
                ta.style.overflowY = 'auto';
              }
            }
          } else {
            // Keyboard Move
            let lVal = w.offsetLeft;
            let tVal = w.offsetTop;
            if (e.key === 'ArrowRight') lVal += amount;
            if (e.key === 'ArrowLeft') lVal -= amount;
            if (e.key === 'ArrowDown') tVal += amount;
            if (e.key === 'ArrowUp') tVal -= amount;
            
            w.style.left = lVal + 'px';
            w.style.top = tVal + 'px';
          }
          saveWidgets();
        }
      });

      // Todo logic
      if (type === 'todo') setupTodo(w, saved);
      // Sticky logic
      if (type === 'sticky') {
        if (saved && saved.resized) {
          w.dataset.resized = 'true';
        }
        setupSticky(w);
      }
      // Clock logic
      if (type === 'clock') setupClock(w, saved);
      if (type === 'pomodoro') setupPomodoro(w, saved);
      // Shortcuts logic
      if (type === 'shortcuts') setupShortcuts(w, saved);
      // Calendar logic
      if (type === 'calendar') setupCalendar(w, saved);

      saveWidgets();
    }

    function stickyHTML(saved) {
      const val = saved ? saved.text : '';
      return `<div class="sticky-note"><textarea placeholder="Type something...">${val}</textarea></div>`;
    }

    function setupSticky(w) {
      const ta = w.querySelector('.sticky-note textarea');
      const header = w.querySelector('.widget-header');
      function autoResize() {
        if (w.dataset.resized === 'true') {
          ta.style.height = '100%';
          ta.style.overflowY = 'auto';
          return;
        }
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
        const headerH = header.offsetHeight;
        const newH = Math.max(200, headerH + ta.scrollHeight + 32);
        w.style.height = newH + 'px';
        saveWidgets();
      }
      ta.addEventListener('input', autoResize);
      requestAnimationFrame(autoResize);
    }

    function clockHTML(saved) {
      const format = saved ? saved.format : '12h';
      return `
        <div class="clock-body">
          <div class="clock-display"></div>
          <div class="clock-toggle-wrap">
            <span class="clock-switch-label">24h</span>
            <button class="clock-switch${format === '24h' ? ' active' : ''}" role="switch" aria-checked="${format === '24h' ? 'true' : 'false'}" aria-label="Toggle 24-hour format" type="button"></button>
          </div>
        </div>
      `;
    }

    function calendarHTML() {
      const days = ['S','M','T','W','T','F','S'];
      const headers = days.map(d => `<div class="cal-day-header">${d}</div>`).join('');
      const cells = Array.from({length: 35}, () => '<div class="cal-day"></div>').join('');
      return `
        <div class="cal-nav">
          <button class="btn btn-icon cal-prev" aria-label="Previous month" type="button">&lsaquo;</button>
          <span class="cal-month-label"></span>
          <button class="btn btn-sm cal-today" type="button">Today</button>
          <button class="btn btn-icon cal-next" aria-label="Next month" type="button">&rsaquo;</button>
        </div>
        <div class="cal-grid">${headers}${cells}</div>
      `;
    }

    function setupClock(w, saved) {
      const body = w.querySelector('.widget-body');
      const display = body.querySelector('.clock-display');
      const toggleSwitch = body.querySelector('.clock-switch');
      let format = saved ? saved.format : '12h';
      w.dataset.format = format;

      function updateClockTime() {
        const now = new Date();
        const h = now.getHours();
        const m = String(now.getMinutes()).padStart(2, '0');
        if (format === '12h') {
          const ampm = h >= 12 ? 'PM' : 'AM';
          const h12 = h % 12 || 12;
          display.textContent = `${h12}:${m} ${ampm}`;
        } else {
          display.textContent = `${String(h).padStart(2, '0')}:${m}`;
        }
      }

      updateClockTime();
      const interval = setInterval(updateClockTime, 1000);

      toggleSwitch.addEventListener('click', () => {
        format = format === '12h' ? '24h' : '12h';
        w.dataset.format = format;
        const is24 = format === '24h';
        toggleSwitch.classList.toggle('active', is24);
        toggleSwitch.setAttribute('aria-checked', is24 ? 'true' : 'false');
        updateClockTime();
        saveWidgets();
      });

      w._cleanup = () => { clearInterval(interval); };
    }

    function pomodoroHTML() {
      return `
        <div class="pomodoro-body">
          <div class="pomodoro-modes" role="group" aria-label="Pomodoro session type">
            <button class="pomodoro-mode" type="button" data-mode="focus">Focus</button>
            <button class="pomodoro-mode" type="button" data-mode="short">Short break</button>
            <button class="pomodoro-mode" type="button" data-mode="long">Long break</button>
          </div>
          <div class="pomodoro-display" role="timer" aria-label="25 minutes remaining">
            <div class="pomodoro-time">25:00</div>
            <div class="pomodoro-status"></div>
          </div>
          <button class="btn btn-primary pomodoro-start" type="button">Start focus session</button>
        </div>
      `;
    }

    function setupPomodoro(w, saved) {
      const durations = { focus: 25 * 60 * 1000, short: 5 * 60 * 1000, long: 15 * 60 * 1000 };
      const labels = { focus: 'Focus', short: 'Short break', long: 'Long break' };
      const body = w.querySelector('.widget-body');
      const display = body.querySelector('.pomodoro-display');
      const time = body.querySelector('.pomodoro-time');
      const status = body.querySelector('.pomodoro-status');
      const start = body.querySelector('.pomodoro-start');
      let state = saved && saved.pomodoro && Object.keys(saved.pomodoro).length ? saved.pomodoro : {
        mode: 'focus', running: false, remainingMs: durations.focus, completedFocus: 0
      };
      state.mode = durations[state.mode] ? state.mode : 'focus';
      state.completedFocus = Number(state.completedFocus) || 0;
      if (!state.running && !Number.isFinite(state.remainingMs)) state.remainingMs = durations[state.mode];
      let interval = null;

      function persist() {
        w.dataset.pomodoro = JSON.stringify(state);
        saveWidgets();
      }

      function formatTime(ms) {
        const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
        return `${String(Math.floor(totalSeconds / 60)).padStart(2, '0')}:${String(totalSeconds % 60).padStart(2, '0')}`;
      }

      function remaining() {
        return state.running ? Math.max(0, state.endTime - Date.now()) : state.remainingMs;
      }

      function render() {
        const remainingMs = remaining();
        time.textContent = formatTime(remainingMs);
        if (display) display.setAttribute('aria-label', `${Math.ceil(remainingMs / 60000)} minutes remaining`);
        body.querySelectorAll('.pomodoro-mode').forEach(button => {
          const active = button.dataset.mode === state.mode;
          button.classList.toggle('active', active);
          button.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
        const session = labels[state.mode].toLowerCase();
        status.textContent = state.running ? `${labels[state.mode]} in progress` : '';
        start.textContent = state.running ? 'Stop session' : `Start ${session} session`;
      }

      function playCompletionBeep() {
        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return;
          const context = new AudioContextClass();
          const oscillator = context.createOscillator();
          const gain = context.createGain();
          oscillator.frequency.value = 880;
          gain.gain.setValueAtTime(0.0001, context.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.12, context.currentTime + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.35);
          oscillator.connect(gain).connect(context.destination);
          oscillator.start(); oscillator.stop(context.currentTime + 0.36);
          oscillator.addEventListener('ended', () => context.close());
        } catch { /* Audio feedback is optional when the browser blocks playback. */ }
      }

      function notifyCompletion() {
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification(`${labels[state.mode]} complete`, { body: 'Your Pomodoro timer has finished.' });
        }
      }

      function finish() {
        clearInterval(interval); interval = null;
        const completedMode = state.mode;
        state.running = false;
        state.endTime = null;
        state.remainingMs = durations[state.mode];
        if (completedMode === 'focus') state.completedFocus++;
        playCompletionBeep(); notifyCompletion(); persist(); render();
      }

      function tick() {
        if (remaining() <= 0) { finish(); return; }
        render();
      }

      function startTimer() {
        if (state.running) {
          state.remainingMs = remaining();
          state.running = false;
          state.endTime = null;
          clearInterval(interval); interval = null;
        } else {
          if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
          state.running = true;
          state.endTime = Date.now() + state.remainingMs;
          interval = setInterval(tick, 250);
        }
        persist(); render();
      }

      body.querySelectorAll('.pomodoro-mode').forEach(button => button.addEventListener('click', () => {
        if (state.running) { clearInterval(interval); interval = null; }
        state.mode = button.dataset.mode;
        state.running = false; state.endTime = null; state.remainingMs = durations[state.mode];
        persist(); render();
      }));
      start.addEventListener('click', startTimer);
      if (state.running) {
        if (remaining() <= 0) finish();
        else interval = setInterval(tick, 250);
      }
      render();
      w._cleanup = () => { clearInterval(interval); };
    }

    function setupCalendar(w, saved) {
      const body = w.querySelector('.widget-body');
      const label = body.querySelector('.cal-month-label');
      const cells = body.querySelectorAll('.cal-day');
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const today = new Date();
      let viewYear = saved ? saved.viewYear : today.getFullYear();
      let viewMonth = saved ? saved.viewMonth : today.getMonth();
      w.dataset.viewMonth = viewMonth;
      w.dataset.viewYear = viewYear;

      function renderCalendar() {
        label.textContent = `${monthNames[viewMonth]} ${viewYear}`;
        const firstDay = new Date(viewYear, viewMonth, 1).getDay();
        const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
        const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

        cells.forEach((cell, i) => {
          let dayNum, isOther = false;
          if (i < firstDay) {
            dayNum = daysInPrev - firstDay + i + 1;
            isOther = true;
          } else if (i >= firstDay + daysInMonth) {
            dayNum = i - firstDay - daysInMonth + 1;
            isOther = true;
          } else {
            dayNum = i - firstDay + 1;
          }
          cell.textContent = dayNum;
          cell.classList.toggle('other-month', isOther);
          cell.classList.toggle('today',
            !isOther && viewYear === today.getFullYear() && viewMonth === today.getMonth() && dayNum === today.getDate()
          );
        });
      }

      body.querySelector('.cal-prev').addEventListener('click', () => {
        viewMonth--;
        if (viewMonth < 0) { viewMonth = 11; viewYear--; }
        w.dataset.viewMonth = viewMonth;
        w.dataset.viewYear = viewYear;
        renderCalendar();
        saveWidgets();
      });

      body.querySelector('.cal-next').addEventListener('click', () => {
        viewMonth++;
        if (viewMonth > 11) { viewMonth = 0; viewYear++; }
        w.dataset.viewMonth = viewMonth;
        w.dataset.viewYear = viewYear;
        renderCalendar();
        saveWidgets();
      });

      body.querySelector('.cal-today').addEventListener('click', () => {
        const now = new Date();
        viewYear = now.getFullYear();
        viewMonth = now.getMonth();
        w.dataset.viewMonth = viewMonth;
        w.dataset.viewYear = viewYear;
        renderCalendar();
        saveWidgets();
      });

      renderCalendar();
    }

    function todoHTML(saved) {
      const items = saved ? saved.items : [{ text: '', done: false }];
      const lis = items.map(it => `
        <li class="todo-item${it.done ? ' done' : ''}">
          <input type="checkbox"${it.done ? ' checked' : ''}><input class="todo-text" placeholder="New task..." value="${(it.text || '').replace(/"/g, '&quot;')}"><button class="todo-delete" type="button" aria-label="Delete task">&times;</button>
        </li>
      `).join('');
      return `
        <ul class="todo-list">${lis}</ul>
        <div class="add-todo">+ Add task</div>
      `;
    }

    function setupTodo(w, saved) {
      const body = w.querySelector('.widget-body');
      const list = body.querySelector('.todo-list');
      const addBtn = body.querySelector('.add-todo');

      function attachEvents(li) {
        const cb = li.querySelector('input[type="checkbox"]');
        const del = li.querySelector('.todo-delete');
        const text = li.querySelector('.todo-text');

        cb.addEventListener('change', () => {
          li.classList.toggle('done', cb.checked);
          saveWidgets();
        });
        del.addEventListener('click', () => { li.remove(); saveWidgets(); });
        text.addEventListener('input', () => saveWidgets());
        text.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const li = document.createElement('li');
            li.className = 'todo-item';
            li.innerHTML = `<input type="checkbox"><input class="todo-text" placeholder="New task..."><button class="todo-delete" type="button" aria-label="Delete task">&times;</button>`;
            list.appendChild(li);
            li.querySelector('.todo-text').focus();
            attachEvents(li);
            saveWidgets();
          }
        });
      }

      addBtn.addEventListener('click', () => {
        const li = document.createElement('li');
        li.className = 'todo-item';
        li.innerHTML = `<input type="checkbox"><input class="todo-text" placeholder="New task..."><button class="todo-delete" type="button" aria-label="Delete task">&times;</button>`;
        list.appendChild(li);
        li.querySelector('.todo-text').focus();
        attachEvents(li);
        saveWidgets();
      });

      list.querySelectorAll('.todo-item').forEach(attachEvents);
    }

    function shortcutsHTML(saved) {
      return `<div class="shortcuts-grid"></div>`;
    }

    function setupShortcuts(w, saved) {
      function resizeShortcutsToFit() {
        const CELL_SIZE = 82;
        const paddingW = 34;
        const paddingH = 67;
        const GAP = 12;
        const curW = parseFloat(w.style.width) || w.offsetWidth || 274;
        
        let C = Math.floor((curW - paddingW + GAP) / (CELL_SIZE + GAP));
        C = Math.max(1, Math.min(12, C));
        
        const cells = JSON.parse(w.dataset.cells || '[]');
        const totalItems = cells.length;
        const R = Math.ceil(totalItems / C) || 1;
        
        const snapW = C * CELL_SIZE + (C - 1) * GAP + paddingW;
        const snapH = R * CELL_SIZE + (R - 1) * GAP + paddingH;
        
        w.style.width = snapW + 'px';
        w.style.height = snapH + 'px';
      }

      // Options menu extension
      const dropdown = w.querySelector('.widget-menu-dropdown');
      if (dropdown && !dropdown.querySelector('.add-link-option')) {
        const addLinkBtn = document.createElement('button');
        addLinkBtn.className = 'widget-menu-item add-link-option';
        addLinkBtn.type = 'button';
        addLinkBtn.textContent = 'Add link';
        
        const removeBtn = dropdown.querySelector('.delete-widget');
        dropdown.insertBefore(addLinkBtn, removeBtn);
        
        addLinkBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (dropdown.hidePopover) dropdown.hidePopover();
          const triggerBtn = w.querySelector('.widget-menu-btn');
          if (triggerBtn) triggerBtn.blur();
          
          let cells = JSON.parse(w.dataset.cells || '[]');
          const idx = cells.length;
          cells.push({ type: 'empty' });
          w.dataset.cells = JSON.stringify(cells);
          render();
          resizeShortcutsToFit();
          saveWidgets();
          
          openShortcutModal((newShortcut) => {
            cells[idx] = {
              type: 'shortcut',
              url: newShortcut.url,
              title: newShortcut.title,
              domain: newShortcut.domain,
              faviconUrl: newShortcut.faviconUrl
            };
            w.dataset.cells = JSON.stringify(cells);
            saveWidgets();
            render();
            resizeShortcutsToFit();
          });
        });
      }

      let cells = [];
      if (saved && saved.cells) {
        cells = saved.cells;
      } else {
        cells = [
          { type: 'empty' }
        ];
      }
      w.dataset.cells = JSON.stringify(cells);

      const grid = w.querySelector('.shortcuts-grid');

      function render() {
        const cells = JSON.parse(w.dataset.cells || '[]');
        grid.innerHTML = '';
        cells.forEach((c, idx) => {
          const cell = document.createElement('div');
          if (c.type === 'shortcut') {
            cell.className = 'shortcut-cell filled';
            cell.title = c.title;
            cell.innerHTML = `
              <a href="${c.url}" target="_blank" rel="noopener noreferrer">
                <img src="${c.faviconUrl}" alt="${c.title}" class="shortcut-icon" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23888\' stroke-width=\'2\'%3E%3Ccircle cx=\'12\' cy=\'12\' r=\'10\'/%3E%3Cpath d=\'M8 14s1.5 2 4 2 4-2 4-2\'/%3E%3Cline x1=\'9\' y1=\'9\' x2=\'9.01\' y2=\'9\'/%3E%3Cline x1=\'15\' y1=\'9\' x2=\'15.01\' y2=\'9\'/%3E%3C/svg%3E';">
                <span class="shortcut-label">${c.title}</span>
              </a>
              <button class="shortcut-delete" data-index="${idx}" aria-label="Delete shortcut for ${c.title}" title="Delete shortcut">&times;</button>
            `;
            cell.querySelector('.shortcut-delete').addEventListener('click', (e) => {
              e.preventDefault();
              e.stopPropagation();
              showModal('Delete this shortcut?', () => {
                cells.splice(idx, 1);
                w.dataset.cells = JSON.stringify(cells);
                saveWidgets();
                render();
                resizeShortcutsToFit();
              });
            });
          } else {
            cell.className = 'shortcut-cell empty';
            cell.title = 'Add shortcut';
            cell.setAttribute('role', 'button');
            cell.setAttribute('tabindex', '0');
            cell.setAttribute('aria-label', 'Empty shortcut slot. Press Enter to add link.');
            cell.addEventListener('keydown', (e) => {
              if (e.key === 'Enter' || e.key === ' ') {
                if (e.target.closest('.shortcut-delete')) return;
                e.preventDefault();
                cell.click();
              }
            });
            cell.innerHTML = `
              <div class="shortcut-add-icon" aria-hidden="true">+</div>
              <span class="shortcut-label">Add link</span>
              <button class="shortcut-delete" data-index="${idx}" aria-label="Remove cell slot" title="Delete cell">&times;</button>
            `;
            cell.addEventListener('click', (e) => {
              if (e.target.closest('.shortcut-delete')) return;
              openShortcutModal((newShortcut) => {
                cells[idx] = {
                  type: 'shortcut',
                  url: newShortcut.url,
                  title: newShortcut.title,
                  domain: newShortcut.domain,
                  faviconUrl: newShortcut.faviconUrl
                };
                w.dataset.cells = JSON.stringify(cells);
                saveWidgets();
                render();
                resizeShortcutsToFit();
              });
            });
            cell.querySelector('.shortcut-delete').addEventListener('click', (e) => {
              e.preventDefault();
              e.stopPropagation();
              showModal('Delete this cell?', () => {
                cells.splice(idx, 1);
                w.dataset.cells = JSON.stringify(cells);
                saveWidgets();
                render();
                resizeShortcutsToFit();
              });
            });
          }
          grid.appendChild(cell);
        });
      }

      render();
      resizeShortcutsToFit();
    }

    function setupDrag(el) {
      const handle = el.querySelector('.widget-header');
      let dragging = false, startX, startY, origLeft, origTop;

      handle.addEventListener('mousedown', (e) => {
        if (e.target.closest('.widget-menu-wrap')) return;
        dragging = true;
        startX = e.clientX;
        startY = e.clientY;
        origLeft = el.offsetLeft;
        origTop = el.offsetTop;
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        el.style.left = (origLeft + e.clientX - startX) + 'px';
        el.style.top = (origTop + e.clientY - startY) + 'px';
      });

      document.addEventListener('mouseup', () => {
        if (dragging) {
          dragging = false;
          el.style.left = snap(el.offsetLeft) + 'px';
          el.style.top = snap(el.offsetTop) + 'px';
          saveWidgets();
        }
      });
    }

    function setupResize(el) {
      const handle = el.querySelector('.resize-handle');
      let resizing = false, startX, startY, startW, startH;
      const paddingW = 34, paddingH = 67;

      const minW = parseInt(getComputedStyle(el).minWidth);
      const minH = parseInt(getComputedStyle(el).minHeight);

      handle.addEventListener('mousedown', (e) => {
        resizing = true;
        startX = e.clientX;
        startY = e.clientY;
        startW = el.offsetWidth;
        startH = el.offsetHeight;

        e.preventDefault();
        e.stopPropagation();
      });

      document.addEventListener('mousemove', (e) => {
        if (!resizing) return;
        let newW = Math.max(minW, startW + e.clientX - startX);
        let newH = Math.max(minH, startH + e.clientY - startY);

        el.style.width = newW + 'px';
        el.style.height = newH + 'px';
      });

      document.addEventListener('mouseup', () => {
        if (resizing) {
          resizing = false;
          if (el.dataset.type === 'shortcuts') {
            const CELL_SIZE = 82;
            const GAP = 12;
            const curW = el.offsetWidth;
            let C = Math.floor((curW - paddingW + GAP) / (CELL_SIZE + GAP));
            C = Math.max(1, Math.min(12, C));
            const cells = JSON.parse(el.dataset.cells || '[]');
            const totalItems = cells.length;
            const R = Math.ceil(totalItems / C);

            const snapW = C * CELL_SIZE + (C - 1) * GAP + paddingW;
            const snapH = R * CELL_SIZE + (R - 1) * GAP + paddingH;

            el.style.width = snapW + 'px';
            el.style.height = snapH + 'px';
          } else {
            el.style.width = snap(el.offsetWidth) + 'px';
            el.style.height = snap(el.offsetHeight) + 'px';
          }

          if (el.dataset.type === 'sticky') {
            el.dataset.resized = 'true';
            const ta = el.querySelector('.sticky-note textarea');
            if (ta) {
              ta.style.height = '100%';
              ta.style.overflowY = 'auto';
            }
          }

          saveWidgets();
        }
      });
    }

    // Modal
    const closeModal = document.getElementById('close-modal');
    const modalCancel = document.getElementById('modal-cancel');
    const modalConfirm = document.getElementById('modal-confirm');
    let modalCallback = null;

    function showModal(text, cb) {
      closeModal.querySelector('p').textContent = text;
      modalCallback = cb;
      closeModal.showModal();
    }

    modalCancel.addEventListener('click', () => {
      closeModal.close();
      modalCallback = null;
    });

    modalConfirm.addEventListener('click', () => {
      closeModal.close();
      if (modalCallback) modalCallback();
      modalCallback = null;
    });

    if (!('closedBy' in HTMLDialogElement.prototype)) {
      closeModal.addEventListener('click', (e) => {
        if (e.target !== closeModal) return;
        const rect = closeModal.getBoundingClientRect();
        const isContent = (
          rect.top <= e.clientY && e.clientY <= rect.top + rect.height &&
          rect.left <= e.clientX && e.clientX <= rect.left + rect.width
        );
        if (!isContent) {
          closeModal.close();
          modalCallback = null;
        }
      });
    }

    // Shortcut Modal Form Controller
    const shortcutModal = document.getElementById('shortcut-modal');
    const shortcutForm = document.getElementById('shortcut-form');
    const shortcutUrlInput = document.getElementById('shortcut-url');
    const shortcutTitleInput = document.getElementById('shortcut-title');
    const shortcutCancel = document.getElementById('shortcut-cancel');
    let shortcutCallback = null;

    function openShortcutModal(cb) {
      shortcutCallback = cb;
      shortcutUrlInput.value = '';
      shortcutTitleInput.value = '';
      shortcutModal.showModal();
      shortcutUrlInput.focus();
    }

    shortcutCancel.addEventListener('click', () => {
      shortcutModal.close();
      shortcutCallback = null;
    });

    if (!('closedBy' in HTMLDialogElement.prototype)) {
      shortcutModal.addEventListener('click', (e) => {
        if (e.target !== shortcutModal) return;
        const rect = shortcutModal.getBoundingClientRect();
        const isContent = (
          rect.top <= e.clientY && e.clientY <= rect.top + rect.height &&
          rect.left <= e.clientX && e.clientX <= rect.left + rect.width
        );
        if (!isContent) {
          shortcutModal.close();
          shortcutCallback = null;
        }
      });
    }

    shortcutForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const urlVal = shortcutUrlInput.value.trim();
      let titleVal = shortcutTitleInput.value.trim();

      let validatedUrl = urlVal;
      if (!/^https?:\/\//i.test(validatedUrl)) {
        validatedUrl = 'https://' + validatedUrl;
      }

      let parsedDomain = '';
      try {
        const u = new URL(validatedUrl);
        parsedDomain = u.hostname.replace(/^www\./i, '');
      } catch (err) {
        alert('Please enter a valid URL.');
        return;
      }

      if (!titleVal) {
        titleVal = parsedDomain.charAt(0).toUpperCase() + parsedDomain.slice(1);
      }

      const faviconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${parsedDomain}`;

      if (shortcutCallback) {
        shortcutCallback({
          url: validatedUrl,
          title: titleVal,
          domain: parsedDomain,
          faviconUrl: faviconUrl
        });
      }

      shortcutModal.close();
      shortcutCallback = null;
    });

    // Sticky text change tracking
    document.addEventListener('input', (e) => {
      if (e.target.closest('.sticky-note textarea')) saveWidgets();
    });

    // Restore saved widgets
    loadWidgets();
  </script>
</body>
